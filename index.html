<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Garden — Chytré zalévání</title>
  <style>
    :root { --green: #2e7d32; --ink: #1b2a1e; --muted: #55655a; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; color: var(--ink); background: #f7faf7; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    h1 { color: var(--green); font-size: 2rem; margin: 0 0 8px; }
    p.lead { font-size: 1.1rem; color: var(--muted); }
    .links { margin-top: 34px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    a.btn { display: inline-block; padding: 12px 22px; border: 2px solid var(--green); border-radius: 10px; color: var(--green); text-decoration: none; font-weight: 600; min-width: 260px; }
    a.btn:hover { background: var(--green); color: #fff; }
    footer { margin-top: 44px; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🌱 Smart Garden</h1>
  <p class="lead">Chytré zalévání podle počasí — ať nezaléváš zbytečně a nezapomeneš.</p>
  <div class="links">
    <a class="btn" href="privacy.html">Zásady ochrany osobních údajů</a>
    <a class="btn" href="delete-account.html">Smazání účtu a dat</a>
  </div>
  <footer>
    Vyvíjí <strong>VeKode studio</strong> · <a href="mailto:vekode.studio@gmail.com">vekode.studio@gmail.com</a>
  </footer>
</div>
</body>
</html>
